name: MLflow CI - Telco Customer Churn

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        run: echo "Starting MLflow CI pipeline"

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib seaborn

      - name: Set MLflow Tracking URI
        working-directory: MLProject
        run: echo "MLFLOW_TRACKING_URI=file:$(pwd)/mlruns" >> $GITHUB_ENV

      - name: Run mlflow project
        working-directory: MLProject
        run: mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        working-directory: MLProject
        run: |
          RUN_ID=$(find mlruns -mindepth 3 -maxdepth 3 -type d | sort | tail -1 | awk -F'/' '{print $NF}')
          echo "Latest run id: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install --upgrade requests

      # Kriteria 3 - Skilled: simpan artefak hasil training ke repository GitHub yang sama
      # (alternatif dari "Upload to Google Drive", sesuai catatan pada panduan submission)
      - name: Upload to GitHub
        working-directory: MLProject
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f mlruns
          git commit -m "CI: update MLflow run artifacts (run_id=${RUN_ID}) [skip ci]" || echo "Tidak ada perubahan untuk di-commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
